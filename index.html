<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="Análises integradas de exames laboratoriais">
  <title>Exames — Deleon & Monique</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(160deg, #0f0f1a 0%, #1a1a2e 40%, #16213e 100%);
      color: #fff;
      padding: 24px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
    }
    .wrap {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      background: rgba(255,255,255,.08);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -.02em;
    }
    .sub {
      font-size: .9rem;
      opacity: .65;
      margin-bottom: 40px;
      line-height: 1.5;
    }
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 20px 28px;
      border: none;
      border-radius: 16px;
      font-size: 1.15rem;
      font-weight: 700;
      text-decoration: none;
      color: #fff;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(.97); }
    .btn-deleon {
      background: linear-gradient(135deg, #0f3460 0%, #1a5276 100%);
      box-shadow: 0 8px 32px rgba(15,52,96,.45);
    }
    .btn-deleon:hover { box-shadow: 0 12px 40px rgba(15,52,96,.55); }
    .btn-monique {
      background: linear-gradient(135deg, #6b215c 0%, #8e3a7a 100%);
      box-shadow: 0 8px 32px rgba(107,33,92,.45);
    }
    .btn-monique:hover { box-shadow: 0 12px 40px rgba(107,33,92,.55); }
    .btn .icon { font-size: 1.4rem; }
    .btn small {
      display: block;
      font-size: .72rem;
      font-weight: 500;
      opacity: .75;
      margin-top: 2px;
    }
    footer {
      margin-top: 48px;
      font-size: .72rem;
      opacity: .4;
    }
    @media (min-width: 480px) {
      h1 { font-size: 1.75rem; }
      .buttons { flex-direction: row; }
      .btn { flex: 1; flex-direction: column; padding: 28px 20px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">🩺</div>
    <h1>Análise de Exames</h1>
    <p class="sub">Junho 2026 — Lavoisier<br>Selecione o paciente</p>

    <div class="buttons">
      <a class="btn btn-deleon" href="DELEON/index.html">
        <span class="icon">👨</span>
        <span>
          Deleon
          <small>43 anos · Masculino</small>
        </span>
      </a>
      <a class="btn btn-monique" href="MONIQUE/index.html">
        <span class="icon">👩</span>
        <span>
          Monique
          <small>38 anos · Feminino</small>
        </span>
      </a>
    </div>

    <footer>Uso privado · Dados de saúde</footer>
  </div>
</body>
</html>
